kind = "web"
previewPath = "/"
title = "SecretCuesOfMsLee"
version = "1.0.0"
id = "artifacts/secretcues"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
localPort = 19437
name = "web"
paths = ["/"]

[services.development]
run = "pnpm --filter @workspace/secretcues run dev"

[services.env]
PORT = "19437"
BASE_PATH = "/"

[services.production]
build = ["pnpm", "--filter", "@workspace/secretcues", "run", "build"]
publicDir = "artifacts/secretcues/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"
