    aspect_ratio: "16:9"
  - path: "artifacts/secretcues/public/images/jada-portrait.png"
    description: "Artistic, elegant portrait illustration of a beautiful professional woman, warm neutral tones, gold accents, lifestyle blog style, minimalist line art with soft watercolor touches"
