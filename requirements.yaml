packages:
  "framer-motion": "For elegant page transitions and scroll reveals"
  "react-hook-form": "For robust contact form handling"
  "@hookform/resolvers": "For Zod validation in the contact form"
  "zod": "For schema validation"
  "clsx": "Utility for constructing className strings conditionally"
  "tailwind-merge": "Utility to merge tailwind classes safely"
images:
